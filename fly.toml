# Fly.io config for NOVA server
# Deploy: fly deploy
# Secrets: fly secrets set TELEGRAM_BOT_TOKEN=... TELEGRAM_CHAT_ID=... etc.

app = "nova-jimmy"
primary_region = "syd"  # Sydney — closest to Melbourne

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DATABASE_TYPE = "local"
  MODEL_PROVIDER = "openrouter"
  NOVA_WORKFLOWS = "on"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # Must stay alive 24/7
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "nova_workspace"
  destination = "/app/workspace"
  # Stores workspace/ (SOUL.md, USER.md, MEMORY.md, daily notes, nova.db)
  # Create with: fly volumes create nova_workspace --region syd --size 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
